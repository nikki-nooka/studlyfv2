version: "3.8"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: studlyf

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENVIRONMENT: development
      SUPER_ADMIN_EMAILS: nikshith@gmail.com

volumes:
  mongodb_data:
  redis_data:
