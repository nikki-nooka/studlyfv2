services:
  - type: web
    name: studlyf-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: MONGO_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_CAREER
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: FRONTEND_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: SUPER_ADMIN_EMAILS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DB_NAME
        value: studlyf
    healthCheckPath: /health
